<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 19 Task</title>
</head>
<style>
body{
  margin-left: 500px;
}
</style>

<body>

  <h2>Phone Input</h2>
  <input type="text" id="phone-input" placeholder="Enter phone number">

  <h2>Form Validation</h2>
  <form id="my-form">
    <input type="text" id="data-input" placeholder="Enter username">
    <button type="submit">Submit</button>
  </form>

  
  <script> 
     
    const DIGIT_REGEX = /^\d+$/;

    console.log("Test '12345':", DIGIT_REGEX.test("12345"));   // true
    console.log("Test '123a45':", DIGIT_REGEX.test("123a45")); // false

    function checkMinLength(value, min) {
    return value.length >= min;
    }

    console.log("Min length test:", checkMinLength("hello", 5)); // true


    const form = document.getElementById("my-form");

    form.addEventListener("submit", function(e) {
    e.preventDefault();

    const input = document.getElementById("data-input").value;

  
    if (input === "") {
    alert("Field required.");
    return;
    }

   const USERNAME_REGEX = /^[a-z0-9]+$/;

    if (!USERNAME_REGEX.test(input)) {
    alert("Only lowercase letters and numbers allowed.");
    return;
    }

  alert("Form submitted successfully!");
    });

    const ZIP_REGEX = /^\d{5}$/;

    console.log("ZIP '90210':", ZIP_REGEX.test("90210")); 
    console.log("ZIP '9021':", ZIP_REGEX.test("9021"));   
  </script>
</body>
</html>
