<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 20 Mini Project 2</title>
</head>

<body>
    <p id "Identity-Number"></p>
    <script>

        function processPosts() {
            fetch("https://jsonplaceholder.typicode.com/posts")
                .then(response => {
                    return response.json();
                })
                .then(posts => {

                    const filteredPosts = posts.filter(post => post.userId === 1);

                    const totalCount = filteredPosts.reduce((count, post) => {
                        return count + 1;
                    }, 0);

                    console.log("Total posts for userId 1:", totalCount);
                })


                .catch(error => {
                    console.error("Error fetching posts");
                });
        }

        processPosts();
    </script>
</body>

</html>
