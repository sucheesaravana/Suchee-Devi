<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 18 Mini Project 1</title>
</head>
<body>
    <img 
    id="toggle-image" src="https://tse2.mm.bing.net/th/id/OIP.i0KBoK3RY0EuBEAVzdHlAwHaEO?rs=1&pid=ImgDetMain&o=7&rm=3"
    data-alt-src="https://th.bing.com/th/id/OIP.6dLjDPlPCzhPjG8kK96qZQHaKT?w=148&h=206&c=7&r=0&o=7&pid=1.7&rm=3">
    
     <script>
        const img = document.getElementById("toggle-image");
        const originalsrc = img.src;
        
        img.addEventListener("click",function(){
            const currentsrc = img.src;
            const altsrc = img.getAttribute("data-alt-src");
            
            if (currentsrc === altsrc) {
            img.src = originalsrc;
            console.log("Switched back to original image");
            } 
            else {
            img.src = altsrc;
            console.log("Switched to alternate image");
    }

       });
     </script>

     </body>
</html>
