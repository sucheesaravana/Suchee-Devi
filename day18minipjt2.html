<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 18 Mini Project 2</title>
</head>
<style>
    #source-input{
        margin-left: 500px;
        background-color: pink;
        width: 250px ;
        height: 50px;
    }
</style>
<body>
    <input type="text" id="source-input">
    <p id="output-mirror"></p>

    <script>
        const si = document.getElementById("source-input");
        const om = document.getElementById("output-mirror");

        si.addEventListener("keydown", function (e) {
            if(e.key==="q" || e.key==="Q") {
                e.preventDefault();
                console.log("Q is restricted");
            }
        });

        si.addEventListener("keyup", function (e) {
        om.textContent = e.target.value;
    });
    </script>
