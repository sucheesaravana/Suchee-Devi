<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 19 Mini Project 2</title>
</head>

<body>

  <h2>Phone Number Validation</h2>

  <input type="text" id="phone-input" placeholder="Enter phone number">
  <button id="check-btn">Check</button>

  <script>
    const PHONE_REGEX = /\(?\d{3}\)?[-.\s]?\d{3}[-.\s]?\d{4}/;


    function validatePhone(numberString) {
    return PHONE_REGEX.test(numberString);
    }

    const button = document.getElementById("check-btn");

    button.addEventListener("click", function () {
    const inputValue = document.getElementById("phone-input").value;

    if (validatePhone(inputValue)) {
    alert("Valid");
    } else {
    alert("Invalid");
    }
    });
  </script>
</body>
</html>
