<body>
    <script>
        const productitem = {
            name:"fishtank",
            baseprice:500,
            taxrate:0.05,
        calculatetaxedprice: function(){
            return this.baseprice + (this.baseprice * this.taxrate);
        }
        };
        const finalPrice = productitem.calculatetaxedprice();
        console.log("Final Price:", finalPrice);

        const jsondata = JSON.stringify(productitem);
        console.log(jsondata);
    </script>
</body>
